name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build
        run: pnpm --filter @workspace/endangered-species run build
        env:
          GITHUB_PAGES: "true"
          NODE_ENV: production

      - name: Arrange site at /endangered-species-hawaiian-coot
        run: |
          mkdir -p site/endangered-species-hawaiian-coot
          cp -r artifacts/endangered-species/dist/public/. site/endangered-species-hawaiian-coot/
          # .nojekyll must be at the root so GitHub Pages doesn't filter _files
          touch site/.nojekyll
          # Empty homepage — root shows a blank page
          echo "" > site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
